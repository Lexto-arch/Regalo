<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Ti 🌹</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="stars"></div>

    <div class="text-container">
        <h1>Para Ti</h1>
        <p>Mi amorcito bello chulo hermoso te amo tanto mi niña bella jsjsjs, <br>
            Gracias por tenerme paciencia, ya veras que lo recompensare mi amor</p>
    </div>

    <div class="bouquet">
        <!-- Left Rose -->
        <div class="rose rose-left">
            <div class="stem">
                <div class="leaf leaf-left" style="--delay: 1.5s; top: 80px;"></div>
                <div class="leaf leaf-right" style="--delay: 1.8s; top: 150px; left: 4px;"></div>
            </div>
            <div class="blossom"></div>
        </div>

        <!-- Right Rose -->
        <div class="rose rose-right">
            <div class="stem">
                <div class="leaf leaf-left" style="--delay: 1.6s; top: 100px;"></div>
                <div class="leaf leaf-right" style="--delay: 1.9s; top: 180px; left: 4px;"></div>
            </div>
            <div class="blossom"></div>
        </div>

        <!-- Center rose last to pop above others -->
        <div class="rose rose-center">
            <div class="stem">
                <div class="leaf leaf-left" style="--delay: 1.0s; top: 120px;"></div>
                <div class="leaf leaf-right" style="--delay: 1.3s; top: 180px; left: 4px;"></div>
            </div>
            <div class="blossom"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
